<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury TV Screen</title>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050505;
}

/* TV Frame */

#tv {

    position: absolute;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    width: 98vw;
    height: 98vh;

    padding: 10px;

    box-sizing: border-box;

    border-radius: 18px;

    background:
    linear-gradient(
        135deg,
        #111 0%,
        #666 10%,
        #bbb 20%,
        #444 35%,
        #222 50%,
        #777 70%,
        #111 100%
    );

    box-shadow:
        0 0 30px rgba(0,0,0,.9),
        0 0 80px rgba(0,0,0,.6),
        inset 0 0 10px rgba(255,255,255,.25);
}

/* Scherm */

#screen {

    position: relative;

    width: 100%;
    height: 100%;

    overflow: hidden;

    border-radius: 10px;

    background: black;
}


/* LED onderaan */

#screen:after {

    content: "";

    position: absolute;

    bottom: 6px;
    left: 50%;

    transform: translateX(-50%);

    width: 120px;
    height: 4px;

    border-radius: 4px;

    background: #00c8ff;

    box-shadow:
        0 0 10px #00c8ff,
        0 0 20px #00c8ff,
        0 0 30px #00c8ff;

    z-index: 3;
}

iframe {

    width: 100%;
    height: 100%;

    border: none;

    position: relative;
    z-index: 1;
}

</style>
</head>

<body>

<div id="tv">

    <div id="screen">

        <iframe
            src="https://www.youtube.com/embed/FTWH1Fdkjow?autoplay=1&controls=0&loop=1&playlist=FTWH1Fdkjow,FrLZoQUl2mQ,RTXszRHc0qs,RdR6MN2jKYs,hjLruk4uZzQ,Kt5Vv97v5g8&rel=0&modestbranding=1&fs=1"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>

    </div>

</div>

</body>
</html>
